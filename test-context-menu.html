<!DOCTYPE html>
<html>
<head>
    <title>Context Menu Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            background: #18181b;
            color: white;
            font-family: system-ui, sans-serif;
        }
        .test-area {
            width: 100%;
            height: 80vh;
            border: 2px dashed #3f3f46;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: context-menu;
        }
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="test-area" id="testArea">
        <h2>Right-click anywhere in this area to test context menu positioning</h2>
    </div>
    
    <div class="instructions">
        <h3>Testing Instructions:</h3>
        <ul>
            <li>Right-click near the edges of the screen</li>
            <li>Right-click in corners</li>
            <li>Verify menu doesn't touch or go beyond screen edges</li>
            <li>Check submenu positioning as well</li>
        </ul>
    </div>

    <script>
        // Simple context menu implementation for testing
        function clampToViewport(left, top, w, h, pad = 16) {
            const minPad = pad;
            const maxPad = pad + 4;
            
            const maxLeft = window.innerWidth - w - maxPad;
            const maxTop = window.innerHeight - h - maxPad;
            
            const clampedLeft = Math.max(minPad, Math.min(left, maxLeft));
            const clampedTop = Math.max(minPad, Math.min(top, maxTop));
            
            return {
                left: clampedLeft,
                top: clampedTop,
            };
        }

        document.getElementById('testArea').addEventListener('contextmenu', function(e) {
            e.preventDefault();
            
            // Create a simple context menu for testing
            const menu = document.createElement('div');
            menu.style.position = 'fixed';
            menu.style.background = '#27272a';
            menu.style.border = '1px solid #3f3f46';
            menu.style.borderRadius = '8px';
            menu.style.padding = '8px';
            menu.style.minWidth = '200px';
            menu.style.zIndex = '10000';
            menu.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
            
            menu.innerHTML = `
                <div style="padding: 8px; cursor: pointer; hover: background: #3f3f46;">New Folder</div>
                <div style="padding: 8px; cursor: pointer; hover: background: #3f3f46;">Get Info</div>
                <div style="border-top: 1px solid #3f3f46; margin: 4px 0;"></div>
                <div style="padding: 8px; cursor: pointer; hover: background: #3f3f46;">System Preferences</div>
            `;
            
            // Position the menu with clamping
            const menuWidth = 200;
            const menuHeight = 120;
            const clampedPos = clampToViewport(e.clientX, e.clientY, menuWidth, menuHeight, 16);
            
            menu.style.left = clampedPos.left + 'px';
            menu.style.top = clampedPos.top + 'px';
            
            document.body.appendChild(menu);
            
            // Remove menu on click outside
            const removeMenu = () => {
                if (document.body.contains(menu)) {
                    document.body.removeChild(menu);
                }
                document.removeEventListener('click', removeMenu);
            };
            
            setTimeout(() => {
                document.addEventListener('click', removeMenu);
            }, 10);
        });
    </script>
</body>
</html>
